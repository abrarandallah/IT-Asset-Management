{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" href="{% static 'images/logo.png' %}" type="image/x-icon">
    <meta charset="UTF-8">
    <title>Reset Password | IT Asset Management</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #212529;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .reset-box {
            background: rgba(33, 37, 41, 0.95);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
        }

        .form-label {
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="reset-box text-light">
        {% if validlink %}
        <h3 class="text-center mb-4">Reset your password</h3>
        <form method="post" novalidate>
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary w-100 mt-3">Reset Password</button>
        </form>
        {% else %}
        <div class="alert alert-danger">
            This password reset link is invalid, possibly because it has already been used.
        </div>
        {% endif %}
        <div class="text-center mt-3">
            <a href="{% url 'login' %}" class="btn btn-outline-light w-75">Back to Login</a>
        </div>
    </div>
</body>
</html>
