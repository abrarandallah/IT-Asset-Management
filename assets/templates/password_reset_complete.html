{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Password Changed | IT Asset Management</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #212529;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .reset-box {
            background: rgba(33, 37, 41, 0.95);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
        }
    </style>
</head>
<body>
    <div class="reset-box text-light text-center">
        <i class="fas fa-check-circle text-success mb-3" style="font-size: 2.5rem;"></i>
        <h3>Password Changed</h3>
        <p class="mt-2">You can now log in with your new password.</p>
        <a href="{% url 'login' %}" class="btn btn-outline-light d-block mx-auto w-75 mt-3">Login Now</a>
    </div>
</body>
</html>
