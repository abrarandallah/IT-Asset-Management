{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}My IT App{% endblock %}</title>
    <link rel="icon" href="{% static 'images/logo.png' %}" type="image/x-icon" />
    <link rel="stylesheet" href="{% static 'css/style.css' %}">  {# optional #}
</head>
<body>
    <header>
        <img src="{% static 'images/logo.png' %}" alt="Logo" height="40px" />
        <!-- Add navbar or branding here -->
    </header>

    <main>
        {% block content %}
        <!-- Page-specific content goes here -->
        {% endblock %}
    </main>
</body>
</html>
